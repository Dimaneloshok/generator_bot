<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<title>Генераторы</title>

<style>

body {
font-family: Arial;
background:#f2f2f2;
padding:20px;
}

.card {

background:white;
padding:20px;
margin:15px auto;
max-width:500px;
border-radius:15px;

}

button {

background:#ff7a00;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:10px;

}

</style>

</head>


<body>


<h2>
Подходящие генераторы
</h2>


{% for g in generators %}


<div class="card">


<h3>
{{ g["Модель"] }}
</h3>


<p>
Мощность: {{ g["Мощность"] }}
</p>


<p>
Цена: {{ g["цена"] }} ₽
</p>


<a href="/generator/{{ g['id'] }}">

<button>
Выбрать
</button>

</a>


</div>


{% endfor %}


</body>

</html>
